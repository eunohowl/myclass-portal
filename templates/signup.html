<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Sign Up - MY CLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xlNDA">
        <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 rounded-xl bg-emerald-500 flex items-center justify-center font-black text-xl text-slate-950 mb-2">IT</div>
            <h1 class="text-xl font-bold text-white">Buat Akun Portal</h1>
        </div>
        {% if error %}<div class="mb-4 text-xs text-rose-400 bg-rose-500/10 p-3 rounded-xl">{{ error }}</div>{% endif %}
        <form action="/signup" method="POST" class="space-y-4">
            <div><label class="block text-xs font-semibold text-slate-400 mb-2">Email Baru</label>
            <input type="email" name="email" required placeholder="contoh@gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:border-emerald-500 focus:outline-none"></div>
            <div><label class="block text-xs font-semibold text-slate-400 mb-2">Password</label>
            <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:border-emerald-500 focus:outline-none"></div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-xl text-sm transition-all shadow-md">Daftarkan Akun</button>
        </form>
        <div class="mt-4 text-center"><p class="text-xs text-slate-400">Sudah punya akun? <a href="/" class="text-emerald-400 hover:underline">Log in</a></p></div>
    </div>
</body>
</html>
